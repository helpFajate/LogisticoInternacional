{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="text-center mb-4">
            <i class="fas fa-boxes-packing fa-3x text-primary mb-3"></i>
            <h2 class="fw-bold">Gestión de Lista de Empaque</h2>
            <p class="text-muted">Carga tu archivo .xlsm para generar el resumen logístico automáticamente.</p>
        </div>

        <div class="card border-0 shadow-sm mb-4">
            <div class="card-body p-5">
                <form action="/upload-packing" method="post" enctype="multipart/form-data">
                    <div class="mb-4 text-center">
                        <label for="file" class="form-label d-block p-5 border border-2 border-dashed rounded-3 bg-light hover-shadow cursor-pointer" style="border-style: dashed !important;">
                            <i class="fas fa-cloud-upload-alt fa-2x text-secondary mb-2"></i>
                            <span class="d-block fw-bold text-dark">Arrastra o selecciona tu archivo Excel</span>
                            <span class="text-muted small">Formatos permitidos: .xlsm, .xlsx</span>
                            <input type="file" name="file" id="file" class="form-control d-none" accept=".xlsm, .xlsx" required onchange="updateFileName(this)">
                            <div id="file-name-display" class="mt-2 text-primary fw-bold"></div>
                        </label>
                    </div>
                    
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg shadow">
                            <i class="fas fa-sync-alt me-2"></i> Iniciar Procesamiento
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card border-0 shadow-sm border-start border-4 border-info">
            <div class="card-body d-flex align-items-center py-4">
                <div class="icon-box me-3 text-info">
                    <i class="fas fa-info-circle fa-2x"></i>
                </div>
                <div>
                    <h6 class="mb-1 fw-bold text-dark">Estado del Análisis</h6>
                    <p class="mb-0 text-secondary small">Esperando carga de archivo para mostrar el resumen de pesos y dimensiones.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Pequeño script para que se vea el nombre del archivo al seleccionarlo
    function updateFileName(input) {
        const display = document.getElementById('file-name-display');
        if (input.files && input.files.length > 0) {
            display.innerHTML = '<i class="fas fa-file-excel me-1"></i> ' + input.files[0].name;
        }
    }
</script>

<style>
    .cursor-pointer { cursor: pointer; }
    .hover-shadow:hover { background-color: #e9ecef !important; border-color: #0d6efd !important; }
    .border-dashed { border-width: 2px; }
</style>
{% endblock %}
